<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Entrar — DP · Agência Nexus</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800;900&display=swap"/>
<style>
/* ── vars ── */
:root {
  --accent:  #3b82f6;
  --primary: #1e40af;
  --bg:      #080808;
  --card:    #111111;
  --card2:   #161616;
  --border:  rgba(59,130,246,0.14);
  --border2: rgba(59,130,246,0.32);
  --text:    #f0f0f0;
  --muted:   #666;
  --red:     #e74c3c;
  --radius:  16px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;font-size:14px}

/* ── grid bg ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(59,130,246,0.022) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(59,130,246,0.022) 1px,transparent 1px);
  background-size:52px 52px;
}

/* ── glow orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(30,64,175,0.18);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(59,130,246,0.10);bottom:-80px;right:-80px}

/* ── layout ── */
.page{
  position:relative;z-index:1;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:1.5rem;
}

/* ── card ── */
.card{
  width:100%;max-width:420px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:2.2rem 2rem;
  box-shadow:0 0 0 1px rgba(0,0,0,0.6),0 32px 80px rgba(0,0,0,0.5);
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ── logo area ── */
.logo-wrap{text-align:center;margin-bottom:2rem}
.logo-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  font-size:1.4rem;font-weight:900;color:#fff;letter-spacing:-1px;
  margin-bottom:.8rem;box-shadow:0 0 32px rgba(59,130,246,0.25);
}
.logo-title{font-size:1.1rem;font-weight:800;color:var(--text)}
.logo-title span{color:var(--accent)}
.logo-sub{font-size:.68rem;color:var(--muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:1.5px}

/* ── tabs ── */
.tabs{display:flex;gap:.3rem;background:var(--card2);border-radius:10px;padding:.25rem;margin-bottom:1.6rem}
.tab{
  flex:1;text-align:center;padding:.45rem;border-radius:8px;
  font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;
  color:var(--muted);
}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.4)}

/* ── form ── */
.form-group{margin-bottom:1rem}
label{display:block;font-size:.68rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem}
.fi{
  width:100%;background:var(--card2);border:1.5px solid var(--border);
  border-radius:10px;padding:.7rem .9rem;font-family:inherit;
  font-size:.82rem;color:var(--text);outline:none;transition:border .15s;
}
.fi:focus{border-color:var(--border2);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.fi::placeholder{color:var(--muted)}

/* ── password wrapper ── */
.pw-wrap{position:relative}
.pw-toggle{
  position:absolute;right:.75rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);font-size:.9rem;
  padding:.2rem;
}

/* ── btn ── */
.btn-login{
  width:100%;padding:.8rem;border-radius:11px;border:none;cursor:pointer;
  font-family:inherit;font-size:.85rem;font-weight:800;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;transition:all .15s;margin-top:.4rem;
  box-shadow:0 4px 20px rgba(59,130,246,.2);
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(59,130,246,.3)}
.btn-login:active{transform:none}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-ghost-sm{
  background:none;border:none;cursor:pointer;font-family:inherit;
  font-size:.7rem;color:var(--muted);text-decoration:underline;
  text-underline-offset:2px;padding:0;
}
.btn-ghost-sm:hover{color:var(--accent)}

/* ── msg boxes ── */
.msg{
  padding:.65rem .9rem;border-radius:9px;font-size:.72rem;
  font-weight:600;margin-bottom:1rem;display:none;
}
.msg.err {background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c}
.msg.ok  {background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.3);color:#3b82f6}
.msg.show{display:block}

/* ── divider ── */
.divider{display:flex;align-items:center;gap:.7rem;margin:1.1rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* ── footer ── */
.card-ft{
  text-align:center;margin-top:1.5rem;
  font-size:.62rem;color:var(--muted);line-height:1.7;
}
.card-ft a{color:var(--accent);text-decoration:none}

/* ── loading spinner ── */
.spinner{
  display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── security badge ── */
.sec-badge{
  display:flex;align-items:center;gap:.5rem;justify-content:center;
  font-size:.62rem;color:var(--muted);margin-top:1.2rem;
}
.sec-badge .dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 6px var(--accent);
}

/* ── Mobile ── */
@media (max-width: 480px) {
  .page { padding: 0; align-items: flex-end; }
  .card { border-radius: 20px 20px 0 0; padding: 1.8rem 1.4rem 2rem; max-width: 100%; }
  .logo-badge { width: 46px; height: 46px; font-size: 1.1rem; }
  .logo-title { font-size: 0.95rem; }
  .btn-login { min-height: 48px; font-size: 0.9rem; }
  .fi { font-size: 16px !important; }
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-badge">NX</div>
      <div class="logo-title">Agência <span>Nexus</span></div>
      <div class="logo-sub">Sistema de Gestão de Talentos</div>
    </div>

    <!-- Tabs Login / Recuperar -->
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="showTab('login',this)">Entrar</div>
      <div class="tab"        onclick="showTab('reset',this)">Recuperar Senha</div>
    </div>

    <!-- Mensagens -->
    <div class="msg err" id="msgErr"></div>
    <div class="msg ok"  id="msgOk"></div>

    <!-- ── TAB: LOGIN ── -->
    <div id="tabLogin">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input class="fi" type="email" id="email" placeholder="seu@email.com"
               autocomplete="email" autofocus/>
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="pw-wrap">
          <input class="fi" type="password" id="senha" placeholder="••••••••"
                 autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()"/>
          <button class="pw-toggle" type="button" onclick="toggleSenha()" title="Mostrar/ocultar senha">👁</button>
        </div>
      </div>
      <div style="text-align:right;margin:-0.4rem 0 1rem">
        <button class="btn-ghost-sm" onclick="showTab('reset',document.querySelectorAll('.tab')[1])">
          Esqueci minha senha
        </button>
      </div>
      <button class="btn-login" id="btnLogin" onclick="fazerLogin()">
        <span id="btnLoginTxt">Entrar no Sistema</span>
        <div class="spinner" id="spinnerLogin"></div>
      </button>
    </div>

    <!-- ── TAB: RECUPERAR SENHA ── -->
    <div id="tabReset" style="display:none">
      <p style="font-size:.72rem;color:var(--muted);margin-bottom:1rem;line-height:1.6">
        Digite seu e-mail e enviaremos um link para redefinir sua senha.
      </p>
      <div class="form-group">
        <label for="emailReset">E-mail cadastrado</label>
        <input class="fi" type="email" id="emailReset" placeholder="seu@email.com"
               onkeydown="if(event.key==='Enter')enviarReset()"/>
      </div>
      <button class="btn-login" id="btnReset" onclick="enviarReset()">
        <span id="btnResetTxt">Enviar Link de Recuperação</span>
        <div class="spinner" id="spinnerReset"></div>
      </button>
      <div style="text-align:center;margin-top:1rem">
        <button class="btn-ghost-sm" onclick="showTab('login',document.querySelectorAll('.tab')[0])">
          ← Voltar ao login
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="card-ft">
      Acesso restrito ao time de RH.<br/>
      Problemas? Fale com o <a href="/cdn-cgi/l/email-protection#cba8a4a5bfb9aabfa4b88baaacaea5a8a2aaaeb3a2bfbfbeb8e5a8a4a6e5a9b9">administrador</a>.
    </div>

    <!-- Security badge -->
    <div class="sec-badge">
      <div class="dot"></div>
      Conexão segura · Autenticação via Supabase
    </div>

  </div>
</div>

<!-- Supabase SDK -->
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIGURAÇÃO — substitua pelos seus valores ──
const SUPABASE_URL      = 'https://huycenqggwkfhvoynnhi.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_XPRq5RZwkFLToHc8cYcXXg_5YnPr-TA';

// ── Init ──
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Se já tem sessão ativa, redireciona ──
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) setTimeout(goNext, 100);
})();

// ── UI helpers ──
function showTab(name, el) {
  document.getElementById('tabLogin').style.display = name === 'login' ? 'block' : 'none';
  document.getElementById('tabReset').style.display = name === 'reset' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', (name==='login' && i===0)||(name==='reset' && i===1)));
  clearMsgs();
}

function toggleSenha() {
  const inp = document.getElementById('senha');
  inp.type  = inp.type === 'password' ? 'text' : 'password';
}

function showErr(msg) {
  const el = document.getElementById('msgErr');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('msgOk').classList.remove('show');
}
function showOk(msg) {
  const el = document.getElementById('msgOk');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('msgErr').classList.remove('show');
}
function clearMsgs() {
  document.getElementById('msgErr').classList.remove('show');
  document.getElementById('msgOk').classList.remove('show');
}

function setLoading(btn, spinner, txt, isLoading, label='Entrar no Sistema') {
  document.getElementById(btn).disabled = isLoading;
  document.getElementById(spinner).style.display = isLoading ? 'block' : 'none';
  document.getElementById(txt).style.display      = isLoading ? 'none'  : 'inline';
}

// ── Login ──
async function fazerLogin() {
  clearMsgs();
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;

  if (!email || !senha) { showErr('Preencha e-mail e senha.'); return; }

  setLoading('btnLogin','spinnerLogin','btnLoginTxt', true);

  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });

  setLoading('btnLogin','spinnerLogin','btnLoginTxt', false);

  if (error) {
    const msgs = {
      'Invalid login credentials': 'E-mail ou senha incorretos.',
      'Email not confirmed':        'Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.',
      'Too many requests':          'Muitas tentativas. Aguarde alguns minutos.',
    };
    showErr(msgs[error.message] || `Erro: ${error.message}`);
    return;
  }

  // Sucesso → aguarda sessão ser salva, depois redireciona
  setTimeout(goNext, 300);
}

// ── Reset de senha ──
async function enviarReset() {
  clearMsgs();
  const email = document.getElementById('emailReset').value.trim();
  if (!email) { showErr('Digite seu e-mail.'); return; }

  setLoading('btnReset','spinnerReset','btnResetTxt', true);

  // URL de redirecionamento após clicar no link do e-mail
  const redirectTo = 'https://agencianexus.github.io/agencianexus/reset-senha.html';

  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });

  setLoading('btnReset','spinnerReset','btnResetTxt', false);

  if (error) { showErr(`Erro: ${error.message}`); return; }

  showOk('Link enviado! Verifique sua caixa de entrada (e spam).');
}

// ── Redirecionamento pós-login ──
function goNext() {
  const params = new URLSearchParams(window.location.search);
  const next   = params.get('next');
  if (next && !next.includes('login')) {
    window.location.replace(decodeURIComponent(next));
  } else {
    window.location.replace('./index.html');
  }
}
</script>
</body>
</html>
